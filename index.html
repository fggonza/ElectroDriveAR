<div class="calculator-card">
    <header>
        <h2>ElectroDrive<span class="accent">AR</span></h2>
    </header>

    <section class="config-group">
        <select id="car-select">
            <option value="43.2">BYD Dolphin Mini GS (43.2 kWh)</option>
            <option value="60.5">BYD Yuan Plus (60.5 kWh)</option>
        </select>
        <div class="range-header"><span>Salud Batería (SOH): <b id="soh-display">100%</b></span></div>
        <input type="range" id="soh-range" min="70" max="100" value="100">
    </section>

    <hr class="divider">

    <section class="control-box">
        <label>Tramo de Batería (Inicio - Fin)</label>
        <div class="double-slider-container">
            <div class="slider-track"></div>
            <input type="range" id="soc-start" min="0" max="100" value="20">
            <input type="range" id="soc-end" min="0" max="100" value="100">
        </div>
        <div class="value-badge">Uso: <span id="soc-range-display">20% - 100%</span> (<span id="soc-delta">80</span>%)</div>
    </section>

    <section class="control-box">
        <label>Rendimiento</label>
        <div class="preset-buttons">
            <button onclick="setEff(9.0)">Ciudad</button>
            <button onclick="setEff(7.5)">Mixto</button>
            <button onclick="setEff(6.0)">Ruta</button>
            <button onclick="setEff(5.0)">Autopista</button>
        </div>
        <input type="range" id="eff-range" min="3" max="12" step="0.1" value="7.5">
        <div class="value-badge"><span id="eff-display">7.5</span> km/kWh</div>
    </section>

    <section class="control-box highlight">
        <label>Autonomía Objetivo (km)</label>
        <input type="range" id="range-slider" min="0" max="600" value="300">
        <div class="autonomy-value"><span id="range-display">300</span> <small>km</small></div>
    </section>
</div>
